# Profile used when running in Docker (see docker-compose). Overrides dev H2 settings.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/busdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bus}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bus}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

app.jwt.secret=${APP_JWT_SECRET:ChangeThisToASecure256BitSecretKeyForProductionUseOnly123456}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
