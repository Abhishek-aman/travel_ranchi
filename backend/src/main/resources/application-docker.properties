# Profile used when running in Docker (see docker-compose). Overrides dev H2 settings.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/busdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bus}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bus}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

app.jwt.secret=${APP_JWT_SECRET:ChangeThisToASecure256BitSecretKeyForProductionUseOnly123456}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.whatsapp.enabled=${APP_WHATSAPP_ENABLED:false}
app.whatsapp.gupshup-api-key=${APP_WHATSAPP_GUPSHUP_API_KEY:}
app.whatsapp.gupshup-source-number=${APP_WHATSAPP_GUPSHUP_SOURCE_NUMBER:}
app.whatsapp.gupshup-app-name=${APP_WHATSAPP_GUPSHUP_APP_NAME:}
app.whatsapp.gupshup-template-endpoint=${APP_WHATSAPP_GUPSHUP_TEMPLATE_ENDPOINT:https://api.gupshup.io/wa/api/v1/template/msg}
app.whatsapp.gupshup-message-endpoint=${APP_WHATSAPP_GUPSHUP_MESSAGE_ENDPOINT:https://api.gupshup.io/wa/api/v1/msg}
app.whatsapp.default-country-code=${APP_WHATSAPP_DEFAULT_COUNTRY_CODE:91}
app.whatsapp.ticket-base-url=${APP_WHATSAPP_TICKET_BASE_URL:https://travelranchi.com}
app.whatsapp.message-mode=${APP_WHATSAPP_MESSAGE_MODE:TEMPLATE}
app.whatsapp.ticket-confirmation-template-id=${APP_WHATSAPP_TICKET_CONFIRMATION_TEMPLATE_ID:}
app.whatsapp.ticket-confirmation-language-code=${APP_WHATSAPP_TICKET_CONFIRMATION_LANGUAGE_CODE:en}
app.whatsapp.ticket-confirmation-template-params=${APP_WHATSAPP_TICKET_CONFIRMATION_TEMPLATE_PARAMS:passengerName,bookingReference,route,travelDate,departureTime,seatLabels,ticketUrl}
app.whatsapp.ticket-confirmation-text-template=${APP_WHATSAPP_TICKET_CONFIRMATION_TEXT_TEMPLATE:}
