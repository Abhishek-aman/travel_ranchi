spring.application.name=bus-booking

# H2 (dev) — use PostgreSQL in production
spring.datasource.url=jdbc:h2:mem:busdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# JWT
app.jwt.secret=ChangeThisToASecure256BitSecretKeyForProductionUseOnly123456
app.jwt.expiration-ms=86400000

# OpenAPI / Swagger UI (share /v3/api-docs with frontend or import into Postman)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.path=/v3/api-docs
